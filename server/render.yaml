services:
  - type: web
    name: outbreakiq-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GEMMA_PROVIDER
        value: google
      - key: GEMMA_API_KEY
        sync: false
      - key: GEMMA_MODEL
        value: gemma-2-9b-it
      - key: CLIENT_URL
        sync: false
